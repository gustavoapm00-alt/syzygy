; PROJECT: SYZYGY — DefaultEngine.ini
; Aerelion Systems | UE5.5+
; Lumen GI + Nanite + VSM + TSR configuration

[/Script/Engine.RendererSettings]
; Lumen Global Illumination
r.DynamicGlobalIlluminationMethod=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.HardwareRayTracing=0
r.Lumen.Reflections.Allow=1

; Nanite
r.Nanite=1

; Virtual Shadow Maps (required for Nanite compatibility)
r.Shadow.Virtual.Enable=1

; Temporal Super Resolution (primary upscaler — renders at 1440p, outputs 4K)
r.AntiAliasingMethod=4
r.TemporalAA.Upsampling=1
r.ScreenPercentage=67

; Motion Blur — per-object, critical for extraction shooter feel
r.MotionBlurQuality=4
r.MotionBlur.Max=0.1

; Sky Atmosphere
r.SkyAtmosphere=1

; Texture streaming pool — prevent VRAM spikes from Megascans
r.Streaming.PoolSize=2048
r.MaxAnisotropy=8
r.Streaming.MaxTextureUVDensity=256

; Hardware cursor (performance)
bHardwareCursorSupport=True

[/Script/Engine.Engine]
; Enhanced Input System (required)
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput

[/Script/EngineSettings.GameMapsSettings]
GlobalDefaultGameMode=/Script/Syzygy.SyzygyGameMode
GameDefaultMap=/Game/Maps/L_TestGrey

[/Script/Engine.CollisionProfile]
+Profiles=(Name="NPC",CollisionEnabled=QueryAndPhysics,bCanModify=True,ObjectTypeName="Pawn",CustomResponses=(),HelpMessage="NPC collision channel")
+Profiles=(Name="Projectile",CollisionEnabled=QueryOnly,bCanModify=True,ObjectTypeName="PhysicsBody",CustomResponses=(),HelpMessage="Weapon projectile")

[SystemSettings]
; Lumen Scene detail
r.Lumen.Scene.SurfaceCacheResolution=1.0
r.Lumen.TraceMeshSDFs=1

; LOD bias for Megascans textures (prevents 8K VRAM spikes on mid-tier GPUs)
r.Streaming.LimitPoolSizeToVRAM=1
r.Streaming.MaxEffectiveScreenSize=0
